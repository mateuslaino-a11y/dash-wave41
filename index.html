<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Operação Rodrigo — Trilha 41</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --onyx:#1A1A1A; --azul:#3B55CC; --azul-esc:#2A3E99; --azul-cl:#6B7FE0;
  --surface:#222228; --surface2:#2C2C36; --surface3:#38383F; 
  --verde:#3DBD88; --verde-bg:rgba(61,189,136,.12);
  --vermelho:#E85A4F; --verm-bg:rgba(232,90,79,.12);
  --txt:#fff; --txt2:#A8A8BE; --txt3:#5E5E72;
  --borda:rgba(255,255,255,.07); --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Bricolage Grotesque',sans-serif;background:var(--onyx);color:var(--txt);min-height:100vh}
#page-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--borda);border-radius:16px;padding:40px;width:100%;max-width:400px}
.btn-login{width:100%;background:var(--azul);color:#fff;border:none;border-radius:8px;padding:14px;font-weight:700;cursor:pointer}
#page-dash{display:none;flex-direction:column;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--borda);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.filters-bar{padding:16px 28px;background:var(--surface2);display:flex;gap:12px;align-items:center}
.main{padding:24px 28px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:var(--surface);border:1px solid var(--borda);border-radius:var(--radius);padding:20px;text-align:center}
.kpi-num{font-size:24px;font-weight:800}
.funil-card{background:var(--surface);border:1px solid var(--borda);border-radius:var(--radius);padding:20px;margin-bottom:22px}
.funil-row{display:grid;grid-template-columns:150px 1fr 60px;gap:10px;align-items:center;margin-bottom:8px}
.funil-bar{height:20px;background:var(--surface3);border-radius:4px;overflow:hidden}
.funil-bar-fill{height:100%;transition:width 0.5s}
.table-card{background:var(--surface);border:1px solid var(--borda);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--surface2);padding:10px;text-align:left;color:var(--txt3);text-transform:uppercase}
td{padding:10px;border-bottom:1px solid var(--borda)}
.badge{padding:2px 8px;border-radius:10px;font-weight:700;font-size:10px}
.badge-verde{background:var(--verde-bg);color:var(--verde)}
.badge-vermelho{background:var(--verm-bg);color:var(--vermelho)}
</style>
</head>
<body>

<div id="page-login">
  <div class="login-card">
    <div style="margin-bottom:20px"><h1>Trilha 41</h1><p>Login Operação</p></div>
    <input type="email" id="login-email" placeholder="E-mail" style="width:100%;padding:10px;margin-bottom:10px;background:var(--surface2);border:none;border-radius:8px;color:white">
    <input type="password" id="login-pass" placeholder="Senha" style="width:100%;padding:10px;margin-bottom:10px;background:var(--surface2);border:none;border-radius:8px;color:white">
    <button class="btn-login" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="page-dash">
  <header class="header">
    <div><strong>Operação Rodrigo Chociai</strong></div>
    <button onclick="doLogout()">Sair</button>
  </header>
  <div class="filters-bar">
    <select id="camp-filter" onchange="applyFilters()"><option value="">Todas as campanhas</option></select>
    <input type="text" id="search-input" placeholder="Buscar lead..." oninput="applyFilters()">
  </div>
  <div class="main">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="funil-card">
      <div style="margin-bottom:15px;font-weight:700">Funil da Operação</div>
      <div id="funil-grid"></div>
    </div>
    <div class="table-card">
      <table>
        <thead><tr><th>Nome</th><th>Status</th><th>Cadência</th></tr></thead>
        <tbody id="leads-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gpilasgpumovlmnsdycq.supabase.co'
const SUPABASE_KEY = 'sb_publishable_Liymz5H6GqF6uNO1g9nD9A_UPfRCqn8'
const { createClient } = window.supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

let ALL_LEADS = []

async function doLogin() {
  const email = document.getElementById('login-email').value
  const pass  = document.getElementById('login-pass').value
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass })
  if (error) alert(error.message); else { location.reload(); }
}

async function doLogout() { await sb.auth.signOut(); location.reload(); }

async function loadData() {
  const { data } = await sb.from('kommo_logs').select('*');
  const leads = {};
  
  // Tabela de Tradução de IDs
  const idMap = {
    '107975211': 'D3',
    '107210679': 'D7',
    '107977459': 'REUNIÃO AGENDADA',
    '107211175': 'GANHO'
  };

  data.forEach(ev => {
    if(!leads[ev.lead_id]) leads[ev.lead_id] = { id: ev.lead_id, name: ev.lead_name, status: 'Entrada', cadencia: '' };
    
    // Tradução e Limpeza
    let st = ev.status || '';
    if (idMap[st]) st = idMap[st];
    if (st.toLowerCase().startsWith('perdido')) st = 'PERDIDO';
    
    leads[ev.lead_id].status = st;
  });
  
  ALL_LEADS = Object.values(leads);
  renderDash();
}

function renderDash() {
  const funilSteps = ['Entrada', 'D1', 'D3', 'D7', 'LEAD RESPONDEU', 'EM CONVERSA COM O CLIENTE', 'INTERESSE MAPEADO', 'REUNIÃO AGENDADA', 'NO SHOW NA REUNIÃO', 'ACOMPANHAMENTO PÓS REUNIÃO', 'GANHO', 'PERDIDO'];
  
  document.getElementById('funil-grid').innerHTML = funilSteps.map(step => {
    const count = ALL_LEADS.filter(l => l.status.toUpperCase() === step.toUpperCase()).length;
    return `
      <div class="funil-row">
        <div>${step}</div>
        <div class="funil-bar"><div class="funil-bar-fill" style="width:${(count/ALL_LEADS.length)*100}%;background:var(--azul)"></div></div>
        <div>${count}</div>
      </div>
    `;
  }).join('');
}

sb.auth.getSession().then(s => { if (s.data.session) { document.getElementById('page-login').style.display='none'; document.getElementById('page-dash').style.display='flex'; loadData(); } });
</script>
</body>
</html>
